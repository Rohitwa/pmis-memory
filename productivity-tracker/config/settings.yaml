# Productivity Tracker — Main Configuration

tracking:
  # Screenshot interval in seconds. Tuned for minimal token spend without
  # losing meaningful activity — a full-focus reading session still gets
  # analyzed, just coarser (every 15s instead of 10s).
  screenshot_interval_active: 15    # When user is active
  screenshot_interval_idle: 60      # When idle — half the capture rate

  # Idle detection
  idle_threshold_secs: 30           # No input for 30s = idle (was 60)
  idle_gap_new_segment_secs: 300    # 5 min idle = force new segment

  # Screenshot processing
  screenshot_max_width: 1024        # Doesn't affect token cost with vision_detail=low
                                    # (server downscales to 512x512 anyway)
  frame_batch_size: 6               # More frames per call amortizes the fixed
                                    # prompt + output overhead; at ~85 tok/image
                                    # the extra images are nearly free.
  skip_similar_threshold: 0.88      # Tighter dedup — skip near-duplicates more
                                    # aggressively (was 0.95). Typing-in-editor
                                    # no longer generates vision calls.

segmentation:
  # Visual diff threshold for new segment
  ssim_threshold: 0.7               # SSIM < this between frames = new segment
  
  # Minimum segment length (avoid micro-segments)
  min_segment_secs: 15              # Segments shorter than this get merged with next

llm:
  # Single provider (OpenAI gpt-4o-mini) for both vision and text. Segment
  # synthesis falls back to a deterministic template if the OpenAI call
  # fails. Ollama paths were removed.
  use_llm_segment_synthesis: true

openai:
  # Vision analysis
  vision_model: "gpt-4o-mini"
  # Text/segment classification
  text_model: "gpt-4o-mini"
  timeout: 45

  # Cost controls ────────────────────────────────────────────────────────
  # vision_detail: "low"  = 85 tokens per image flat (server downscales to 512x512).
  #                Plenty for app + task identification. ~5-8x cheaper.
  # vision_detail: "high" = up to ~765 tokens/image at 1024px. Use only if you
  #                need to read small on-screen text (code, dense documents).
  vision_detail: "low"
  max_tokens_vision: 400     # JSON frame output fits comfortably in 400
  max_tokens_text: 500       # Segment synthesis fits in 500

  # API key is read from env (OPENAI_API_KEY). OPENAI_BASE_URL optionally
  # routes through a proxy (Cloudflare worker) when set.

memory:
  # Hourly aggregation
  hourly_cron: "0 * * * *"          # Every hour on the hour

  # 6-hour comprehensive analysis cycle
  analysis_interval_hours: 6        # Build comprehensive work analysis every 6 hours
  analysis_hours: [0, 6, 12, 18]    # Analysis checkpoints: midnight, 6am, noon, 6pm

  # Central memory sync (every 6 hours, aligned with analysis)
  central_sync_interval_hours: 6    # Sync with PMIS central memory every 6 hours

  # Daily rollup still runs at end of day for the full-day view
  daily_rollup_hour: 23             # 11 PM

  # Embedding model (for tracker's own ChromaDB)
  # Provider: "ollama" (local nomic-embed-text, 768d) | "openai" (text-embedding-3-small, 1536d)
  embedding_provider: "ollama"
  embedding_model: "nomic-embed-text"

  # Matching threshold
  semantic_match_threshold: 0.8

pmis:
  # PMIS v2 central memory — SEPARATE from tracker storage
  # This points to your existing PMIS v2 ChromaDB installation
  chromadb_path: "~/Desktop/memory/pmis_v2/data/chroma"
  collection_name: "pmis_central_memory"
  # All levels merge into central memory for comprehensive tracking
  merge_levels: ["SC", "context", "anchor"]
  merge_threshold: 0.75

matching:
  # Deliverables sync interval (minutes)
  project_tool_sync_interval: 120   # Every 2 hours
  
  # Asana (optional)
  asana_enabled: false
  asana_workspace_id: ""
  asana_token: ""
  
  # Notion (optional)
  notion_enabled: false
  notion_database_id: ""
  notion_token: ""

storage:
  # Retention
  frame_data_retention_days: 7      # Context 2 detail kept for 7 days
  daily_memory_retention: "forever"
  hourly_temp_delete_after_rollup: true
